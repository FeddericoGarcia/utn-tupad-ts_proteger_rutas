<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 Login | FoodStore 🍕</title>
    <script src="https://kit.fontawesome.com/2223cc897f.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="../../../css/style.css" rel="stylesheet">
</head>

<body>
    <div class="bg-login">
        <!--BACKGROUND IMG-->
    </div>
    <section class="login-main">
        <div class="login-card bg-blur">
            <h1 class="card-title montserrat">
                🍕 Food<b>Store</b> 🍕
            </h1>
            <h3 class="card-subtitle montserrat">
                Registrarse
            </h3>
            <form id="form" class="login-form ">
                <label for="input-name" class="label-name montserrat">
                    Nombre Completo
                </label>
                <div class="div-input montserrat">
                    <i class="fa-solid fa-user"></i>
                    <input id="input-name" name="name" type="text" autocomplete="off" required title="Ingresa tu nombre"
                        placeholder="Fedderico Garcia">
                </div>
                <label for="input-email" class="label-email montserrat">
                    Email
                </label>
                <div class="div-input montserrat">
                    <i class="fa-solid fa-at"></i>
                    <input id="input-email" name="email" type="email" autocomplete="off" required
                        title="Ingresa tu correo" placeholder="fedderico.garcia@example.com">
                </div>
                <label for="input-pass" class="label-pass montserrat">
                    Contraseña
                </label>
                <div class="div-input montserrat">
                    <i class="fa-solid fa-lock"></i>
                    <input id="input-pass" name="password" type="password" autocomplete="off" required minlength="8"
                        pattern=".{8,}" title="Minimo 8 carácteres" placeholder="Minimo 8 carácteres">
                </div>
                <label for="input-confirm-pass" class="label-confirm-pass montserrat">
                    Confirmar Contraseña
                </label>
                <div class="div-input montserrat">
                    <i class="fa-solid fa-unlock-keyhole"></i>
                    <input id="input-pass" name="confirm-password" type="password" autocomplete="off" required
                        minlength="8" pattern=".{8,}" title="Minimo 8 carácteres" placeholder="Minimo 8 carácteres">
                </div>
                <!--<label for="rol" class="label-rol montserrat">
                    Rol
                </label>
                <div class="div-input montserrat">
                    <i class="fa-solid fa-arrows-down-to-people"></i>
                    <select name="rol" id="rol" class="input-select">
                        <option value="">Seleccione un rol</option>
                        <option value="client">Cliente</option>
                        <option value="admin">Admin</option>
                    </select>
                </div> -->
                <button type="submit" class="form-btn">
                    Confirmar
                </button>
                <div class="create-account montserrat">
                    ¿Ya tenes una cuenta creada?
                    <a href="../login/login.html">
                        Inicia sesión acá
                    </a>
                </div>
            </form>
        </div>
    </section>
    <footer class="footer montserrat">
        <div class="footer-company">
            © 2026 Food Store. Todos los derechos reservados
        </div>
    </footer>
</body>

</html>
